<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
</head>
<body>
    <header>
            <h1>Clicker Game</h1>
    </header>
    <main>
        <section class="game">
            <div class="scoreboard">
                <p>Points: <span id="points" class="points">0</span></p>
            </div>
            <div class="click-container">
                <img src="img/default.jpg" alt="" role="button" class="clicker-button">
                <p>Base Value: <span id="base-value" class="base-value">0</span></p>
                <p>Upgrades Acquired <span id="upgrades-amount" class="upgrades-amount">0</span></p>
            </div>
        </section>
        <section class="upgrades">

            <button class="upgrades-button" type="button">
                ⚡
            </button>

            <h2>upgrades</h2>
            <ul class="upgrade-list" id="list"></ul>
        </section>
    </main>
    <footer>
        
    </footer>

    <script src="script.js"></script>
</body>
</html>
