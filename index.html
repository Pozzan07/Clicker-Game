<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker</title>
</head>
<body>
    <header>
            <h1>Clicker Game</h1>
    </header>
    <main class="game">
            <div class="scoreboard">
                <p>Points: <span id="points" class="points">0</span></p>
            </div>
            <div class="click-container">
                <img src="img/default.jpg" alt="" role="button" class="clicker-button" id="clicker-button">
                <p>Base Value: <span id="base-value" class="base-value">0</span></p>
                <p>Upgrades Acquired <span id="upgrades-amount" class="upgrades-amount">0</span></p>
            </div>
    </main>
    <aside class="upgrades">

        <button class="upgrades-button" type="button">
            ⚡
        </button>
        <div class="upgrade-content">
            <h2 class="upgrade-title">UPGRADES</h2>
            <ul class="upgrade-list" id="list"></ul>
        </div>
    </aside>
    <footer class="footer">
        <div class="settings">
            <button class="open-settings-btn" id="settings-btn">
                ⚙️
            </button>
        
            <div class="settings-menu" id="settings-menu">
                <p>Settings</p>
                <div class="settings-img">
                    <img src="img/Sound.png" alt="" role="button" id="sound" class="settings-btn">
                    <img src="img/lightmode.png" alt="" role="button" id="dark-mode" class="settings-btn">
                    <img src="img/reset.png" alt="" role="button" id="reset" class="settings-btn">
                </div>
            </div>
        </div>
    </footer>
    <script src="js/variables.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
